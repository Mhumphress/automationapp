<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Data - Automation App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #f8fafc; color: #1e293b; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .status { margin-bottom: 1rem; font-size: 0.9rem; padding: 0.75rem 1rem; border-radius: 8px; background: #e2e8f0; }
    .status.ready { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.running { background: #dbeafe; color: #1e40af; }
    button { background: #4F7BF7; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 0.95rem; font-family: inherit; cursor: pointer; margin-bottom: 1rem; transition: opacity 0.15s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .log { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.8rem; max-height: 500px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
    .log .success { color: #4ade80; }
    .log .error { color: #f87171; }
    .log .info { color: #60a5fa; }
    .log .heading { color: #fbbf24; font-weight: 600; }
    .back { display: inline-block; margin-bottom: 1rem; color: #4F7BF7; text-decoration: none; font-size: 0.9rem; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a href="app.html" class="back">&larr; Back to CRM</a>
  <h1>Product Catalog Seed</h1>
  <p class="subtitle">Seeds verticals, features, packages, add-ons, and billing settings into Firestore.</p>
  <div class="status" id="status">Checking authentication...</div>
  <button id="seedBtn" disabled>Run Seed</button>
  <div class="log" id="log"></div>
  <script type="module" src="js/seed.js"></script>
</body>
</html>
