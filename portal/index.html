<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Customer Portal</title>
  <link rel="icon" type="image/svg+xml" href="../logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../crm/css/auth.css">
  <style>
    .auth-logo svg { color: #0d9488; }
    .auth-btn { background: #0d9488; }
    .auth-btn:hover { background: #0f766e; }
  </style>
</head>
<body>

  <div class="auth-bg"></div>

  <div class="auth-container">

    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="currentColor">
        <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="38" x2="24" y2="8"/><line x1="38" y1="38" x2="24" y2="8"/><line x1="15" y1="26" x2="33" y2="26"/>
        </g>
        <circle cx="24" cy="8" r="3"/><circle cx="10" cy="38" r="3"/><circle cx="38" cy="38" r="3"/>
        <circle cx="15" cy="26" r="2.5"/><circle cx="33" cy="26" r="2.5"/>
      </svg>
      <span>Customer Portal</span>
    </div>

    <div class="auth-card">
      <div id="loginView" class="auth-view active">
        <h1>Welcome</h1>
        <p class="subtitle">Sign in to your customer portal</p>
        <div id="loginError" class="auth-error"></div>
        <form id="loginForm" class="auth-form" autocomplete="on">
          <div class="input-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="email" placeholder="you@company.com" required autocomplete="email">
          </div>
          <div class="input-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" id="loginBtn" class="auth-btn">Sign In</button>
        </form>
        <p class="subtitle" style="margin-top:1rem;font-size:0.85rem;">New customer? <a href="#" id="showRegister" style="color:#0d9488;">Create an account</a></p>
      </div>

      <div id="registerView" class="auth-view">
        <h1>Create Account</h1>
        <p class="subtitle">Use the email address your provider gave you access with</p>
        <div id="registerError" class="auth-error"></div>
        <form id="registerForm" class="auth-form" autocomplete="on">
          <div class="input-group">
            <label for="registerEmail">Email</label>
            <input type="email" id="registerEmail" name="email" placeholder="you@company.com" required autocomplete="email">
          </div>
          <div class="input-group">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" name="password" placeholder="Create a password" required autocomplete="new-password">
          </div>
          <div class="input-group">
            <label for="registerConfirm">Confirm Password</label>
            <input type="password" id="registerConfirm" name="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
          </div>
          <button type="submit" id="registerBtn" class="auth-btn">Create Account</button>
        </form>
        <p class="subtitle" style="margin-top:1rem;font-size:0.85rem;">Already have an account? <a href="#" id="showLogin" style="color:#0d9488;">Sign in</a></p>
      </div>
    </div>

    <div class="auth-footer">
      <a href="../index.html">&larr; Back to Automation App</a>
    </div>

  </div>

  <script type="module" src="js/auth.js?v=2"></script>
</body>
</html>
